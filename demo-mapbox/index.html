<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zartigl × mapbox-gl v2 smoke test</title>

  <!-- mapbox-gl v2 from CDN -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { width: 100%; height: 100%; }
    #log {
      position: fixed; bottom: 0; left: 0; right: 0;
      max-height: 200px; overflow-y: auto;
      background: rgba(0,0,0,.75); color: #0f0;
      font: 11px/1.4 monospace; padding: 6px 10px;
      pointer-events: none;
    }
    .err { color: #f66; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="log"></div>

<script type="module">
// ── tiny console mirror ─────────────────────────────────────────────────────
const logEl = document.getElementById('log');
function log(cls, ...args) {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = args.map(a =>
    typeof a === 'object' ? JSON.stringify(a) : String(a)
  ).join(' ');
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}
const _log = console.log.bind(console);
const _warn = console.warn.bind(console);
const _err = console.error.bind(console);
console.log = (...a) => { _log(...a); log('', ...a); };
console.warn = (...a) => { _warn(...a); log('', '[WARN] ', ...a); };
console.error = (...a) => { _err(...a); log('err', '[ERR] ', ...a); };
window.addEventListener('error', e => log('err', '[UNHANDLED] ' + e.message));
window.addEventListener('unhandledrejection', e => log('err', '[PROMISE] ' + e.reason));

// ── mapbox-gl map ───────────────────────────────────────────────────────────
mapboxgl.accessToken = 'xxx'

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [0, 20],
  zoom: 2,
  projection : 'mercator'
});

// ── zartigl ─────────────────────────────────────────────────────────────────
const ZARR_URL =
  'https://s3.waw3-1.cloudferro.com/mdl-arco-time-009/arco/' +
  'GLOBAL_ANALYSISFORECAST_PHY_001_024/' +
  'cmems_mod_glo_phy-cur_anfc_0.083deg_PT6H-i_202406/timeChunked.zarr';

// Load zartigl from local dist (served alongside this HTML)
const { ParticleLayer } = await import('../dist/zartigl.js');
log('', '[zartigl] module loaded');

const layer = new ParticleLayer({
  id: 'particles',
  source: ZARR_URL,
  variableU: 'uo',
  variableV: 'vo',
  time: 1654041600000,
  depth: 0.494,
  particleCount: 65536,
  speedFactor: 2,
  fadeOpacity: 0.99991,
  dropRate: 0.003,
  dropRateBump: 0.01,
  pointSize: 2.0,
});

map.on('load', () => {
  log('', '[map] style loaded — adding ParticleLayer');

  // Patch render() to log mapFramebuffer on first call
  const _origRender = layer.render.bind(layer);
  let _renderCount = 0;
  layer.render = function(gl, options) {
    if (_renderCount++ < 3) {
      const fbo = gl.getParameter(gl.FRAMEBUFFER_BINDING);
      log('', `[render #${_renderCount}] FBO=${fbo}, canvas=${gl.canvas.width}x${gl.canvas.height}, isArr=${Array.isArray(options)}`);
    }
    return _origRender(gl, options);
  };

  map.addLayer(layer);
  log('', '[map] layer added');
});

map.on('error', e => log('err', '[map error] ' + JSON.stringify(e.error)));
</script>
</body>
</html>
